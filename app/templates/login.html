<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng Nhập – DSS Thu Hồi Nợ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0d6efd 0%, #084298 100%); min-height: 100vh; }
    .login-card { max-width: 420px; margin: 10vh auto; }
    .bank-logo { font-size: 2.5rem; color: #0d6efd; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="card shadow-lg border-0 rounded-4">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-bank2 bank-logo"></i>
        <h4 class="fw-bold mt-2">Ngân Hàng A</h4>
        <p class="text-muted">Hệ thống DSS Thu Hồi Nợ</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
          <div class="alert alert-{{ category }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Tên đăng nhập</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control"
                   placeholder="manager hoặc COL-001" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Mật khẩu</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control"
                   placeholder="Nhập mật khẩu" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold">
          <i class="bi bi-box-arrow-in-right"></i> Đăng Nhập
        </button>
      </form>

      <hr class="my-4">
      <div class="text-muted small">
        <strong>Demo accounts:</strong><br>
        Manager: <code>manager</code> / <code>admin123</code><br>
        Collector: <code>COL-001</code> đến <code>COL-020</code> / <code>col001</code>–<code>col020</code>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
